name: ClassicFoot CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "codex/**"
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage ruff

      - name: Lint (ruff)
        run: python -m ruff check .

      - name: Compile check
        run: |
          python -m py_compile \
            data.py \
            engine.py \
            gameplay.py \
            main.py \
            manager_market.py \
            models.py \
            rivalries.py \
            save.py \
            season.py \
            term.py \
            transfers.py \
            application/events.py \
            application/history.py \
            application/orchestrator.py \
            ui/__init__.py

      - name: Type check (mypy)
        run: |
          python -m mypy \
            models.py \
            engine.py \
            season.py \
            save.py \
            transfers.py \
            manager_market.py \
            main.py \
            ui/

      - name: Run tests with coverage
        run: |
          python -m coverage run -m unittest discover -s tests -p "test_*.py" -v
          python -m coverage report --show-missing
          python -m coverage xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30

  validate-macos:
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests -p "test_*.py" -v
